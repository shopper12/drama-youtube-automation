services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/drama_automation.db
    volumes:
      - ./storage:/app/storage
      - backend_data:/data
    ports:
      - "8000:8000"
  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  backend_data:
