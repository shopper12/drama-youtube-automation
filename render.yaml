services:
  - type: web
    runtime: docker
    name: drama-youtube-api
    plan: free
    region: singapore
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: drama-youtube-db
          property: connectionString
      - key: STORAGE_ROOT
        value: /tmp/drama-storage
      - key: TTS_PROVIDER
        value: edge
      - key: EDGE_TTS_VOICE
        value: ko-KR-SunHiNeural
      - key: YOUTUBE_PUBLISH_ENABLED
        value: "false"
      - key: YOUTUBE_API_KEY
        sync: false
      - key: YOUTUBE_CLIENT_SECRET_JSON
        sync: false
      - key: YOUTUBE_TOKEN_JSON
        sync: false
      - key: RIGHTS_FALLBACK_EMAIL
        sync: false
      - key: NOTIFICATION_WEBHOOK_URL
        sync: false
      - key: FRONTEND_EXTERNAL_HOSTNAME
        fromService:
          name: drama-youtube-admin
          type: web
          envVarKey: RENDER_EXTERNAL_HOSTNAME

  - type: web
    runtime: docker
    name: drama-youtube-admin
    plan: free
    region: singapore
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    autoDeployTrigger: commit
    envVars:
      - key: NEXT_PUBLIC_API_HOSTNAME
        fromService:
          name: drama-youtube-api
          type: web
          envVarKey: RENDER_EXTERNAL_HOSTNAME

databases:
  - name: drama-youtube-db
    plan: free
    region: singapore
    databaseName: drama_youtube
    user: drama_youtube
